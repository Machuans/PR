<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PR Desktop</title>
    <link rel="stylesheet" href="./loading.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar left-sidebar" id="left-sidebar" aria-label="会话与角色">
        <div class="brand-row">
          <div class="brand-mark">PR</div>
          <div class="brand-copy">
            <p>PR Desktop</p>
            <strong>角色工作台</strong>
          </div>
          <button class="icon-button sidebar-collapse" id="sidebar-toggle" type="button" aria-label="折叠左侧栏">‹</button>
        </div>

        <section class="sidebar-section">
          <div class="section-title">会话</div>
          <button class="list-item active" type="button">
            <span class="item-main">未命名聊天</span>
            <span class="item-meta">本地 RP</span>
          </button>
          <button class="list-item" type="button">
            <span class="item-main">角色广场</span>
            <span class="item-meta">Chub / 导入</span>
          </button>
          <button class="list-item" type="button">
            <span class="item-main">记忆摘要</span>
            <span class="item-meta">Summary / Lorebook</span>
          </button>
        </section>

        <section class="sidebar-section">
          <div class="section-title">角色</div>
          <button class="role-row selected" type="button">
            <span class="avatar-token">AI</span>
            <span>
              <strong>Assistant</strong>
              <small>默认助手</small>
            </span>
          </button>
          <button class="role-row" type="button">
            <span class="avatar-token muted">RP</span>
            <span>
              <strong>角色卡</strong>
              <small>等待导入</small>
            </span>
          </button>
        </section>

        <div class="sidebar-footer">
          <button class="sidebar-action" id="open-st-button" type="button">进入 SillyTavern</button>
        </div>
      </aside>

      <main class="main-column" aria-label="核心对话区">
        <header class="main-topbar">
          <button class="icon-button mobile-sidebar-button" id="mobile-sidebar-button" type="button" aria-label="显示侧边栏">☰</button>
          <div class="topbar-title">
            <p>当前工作流</p>
            <h1>本地模型对话准备</h1>
          </div>
          <div class="topbar-actions">
            <div class="connection-pill">
              <span class="dot pending" id="header-dot"></span>
              <span id="header-text">启动中</span>
            </div>
            <button class="primary-button" id="start-button" type="button">启动</button>
            <details class="more-menu">
              <summary>更多</summary>
              <div class="menu-popover">
                <button id="open-models-button" type="button">打开模型目录</button>
                <button id="update-button" type="button">检查更新</button>
                <button id="install-update-button" type="button" disabled>安装更新</button>
                <button id="open-releases-button" type="button">发布页</button>
              </div>
            </details>
            <button class="ghost-button" id="right-toggle" type="button">设置</button>
          </div>
        </header>

        <section class="conversation-surface" aria-label="服务消息流">
          <article class="message-row assistant">
            <div class="message-avatar">PR</div>
            <div class="bubble">
              <div class="bubble-head">
                <strong>PR Agent</strong>
                <span id="mode-agent">pr-agent</span>
              </div>
              <p>本地模型负责对话，云端模型负责记忆、总结、角色卡和世界书整理。</p>
            </div>
          </article>

          <article class="message-row system">
            <div class="message-avatar status-avatar">LM</div>
            <div class="bubble compact">
              <div class="inline-status">
                <span class="dot" id="lm-dot"></span>
                <strong>LM Studio</strong>
                <span id="lm-text">检查中</span>
              </div>
              <small id="lm-model">等待模型状态</small>
              <div class="bubble-actions">
                <button class="accent-button" id="load-local-model-button" type="button" disabled>加载本地模型</button>
              </div>
            </div>
          </article>

          <article class="message-row system">
            <div class="message-avatar status-avatar">ST</div>
            <div class="bubble compact">
              <div class="inline-status">
                <span class="dot" id="st-dot"></span>
                <strong>SillyTavern</strong>
                <span id="st-text">检查中</span>
              </div>
              <small id="st-url">http://127.0.0.1:8000</small>
            </div>
          </article>

          <article class="message-row assistant">
            <div class="message-avatar">AI</div>
            <div class="bubble">
              <div class="bubble-head">
                <strong>多模型策略</strong>
                <span id="mode-theme">微信风格气泡</span>
              </div>
              <div class="strategy-grid">
                <div>
                  <span>本地模型</span>
                  <strong id="mode-local">等待检测</strong>
                </div>
                <div>
                  <span>云端补强</span>
                  <strong id="mode-cloud">自动回退本地</strong>
                </div>
              </div>
            </div>
          </article>
        </section>

        <footer class="composer-bar" aria-label="底部操作栏">
          <button class="icon-button composer-tool" id="composer-settings-button" type="button" aria-label="设置">≡</button>
          <textarea readonly rows="1" aria-label="消息输入框" placeholder="进入 SillyTavern 后开始聊天。"></textarea>
          <button class="send-button" id="copy-proxy-button" type="button">复制接口</button>
        </footer>
      </main>

      <aside class="sidebar right-sidebar" id="right-sidebar" aria-label="模型与设置">
        <section class="panel-card status-panel" id="proxy-panel">
          <div class="panel-head">
            <span class="dot" id="proxy-dot"></span>
            <div>
              <h2>多模型代理</h2>
              <p id="proxy-text">等待后端</p>
            </div>
          </div>
          <code id="proxy-url">http://127.0.0.1:7821/v1</code>
        </section>

        <section class="panel-card status-panel" id="update-panel">
          <div class="panel-head">
            <span class="dot" id="update-dot"></span>
            <div>
              <h2>自动更新</h2>
              <p id="update-text">等待检查</p>
            </div>
          </div>
          <small>GitHub Release 发布后才会推送</small>
        </section>

        <section class="panel-card">
          <div class="panel-title">设置分组</div>
          <div class="settings-list">
            <button type="button">
              <span>基础外观</span>
              <small>主题 / 字体 / 页面宽度</small>
            </button>
            <button type="button">
              <span>聊天显示</span>
              <small>气泡 / 间距 / 头像</small>
            </button>
            <button type="button">
              <span>背景效果</span>
              <small>背景图 / 模糊 / 透明度</small>
            </button>
            <button type="button">
              <span>高级设置</span>
              <small>CSS / 性能 / 视觉效果</small>
            </button>
          </div>
        </section>

        <p class="footer" id="footer">后端连接中</p>
      </aside>
    </div>

    <script>
      const params = new URLSearchParams(location.search);
      const backendPort = params.get('port') || '7821';
      const apiBase = `http://127.0.0.1:${backendPort}`;

      const state = {
        lmDot: document.querySelector('#lm-dot'),
        lmText: document.querySelector('#lm-text'),
        lmModel: document.querySelector('#lm-model'),
        stDot: document.querySelector('#st-dot'),
        stText: document.querySelector('#st-text'),
        stUrl: document.querySelector('#st-url'),
        updateDot: document.querySelector('#update-dot'),
        updateText: document.querySelector('#update-text'),
        proxyDot: document.querySelector('#proxy-dot'),
        proxyText: document.querySelector('#proxy-text'),
        proxyUrl: document.querySelector('#proxy-url'),
        footer: document.querySelector('#footer'),
        headerDot: document.querySelector('#header-dot'),
        headerText: document.querySelector('#header-text'),
        modeAgent: document.querySelector('#mode-agent'),
        modeLocal: document.querySelector('#mode-local'),
        modeCloud: document.querySelector('#mode-cloud'),
        modeTheme: document.querySelector('#mode-theme'),
        loadLocalModelButton: document.querySelector('#load-local-model-button'),
        installUpdateButton: document.querySelector('#install-update-button'),
        preferredLoadModel: null,
        sillyTavernUrl: 'http://127.0.0.1:8000',
      };

      function setDot(dot, ok, pending = false) {
        dot.className = `dot ${ok ? 'ok' : pending ? 'pending' : 'bad'}`;
      }

      function renderStatus(status) {
        setDot(state.lmDot, status.lmStudio.ok);
        const loadedChatModels = status.lmStudio.loadedChatModels || [];
        const availableChatModels = status.lmStudio.availableChatModels || [];
        const loadedLocalModels = loadedChatModels.map((model) => model.id)
          .concat((status.lmStudio.models || []).filter((model) => !model.toLowerCase().includes('embedding')));
        const uniqueLoadedLocalModels = [...new Set(loadedLocalModels)];
        const recommended = status.lmStudio.recommendedLoadModel || availableChatModels[0] || null;
        state.preferredLoadModel = recommended?.id || null;

        if (!status.lmStudio.ok) {
          state.lmText.textContent = '未连接，正在尝试启动';
          state.lmModel.textContent = status.lmStudio.error || '等待 LM Studio Local Server';
        } else if (uniqueLoadedLocalModels.length) {
          state.lmText.textContent = '本地模型已挂载，可用于聊天';
          state.lmModel.textContent = `已加载：${uniqueLoadedLocalModels.join(', ')}`;
        } else if (availableChatModels.length) {
          state.lmText.textContent = '已检测到下载模型，等待加载';
          state.lmModel.textContent = `可加载：${availableChatModels.map((model) => model.label || model.id).join(', ')}`;
        } else {
          state.lmText.textContent = '接口已连接，但未发现聊天模型';
          state.lmModel.textContent = `OpenAI 兼容列表：${status.lmStudio.openAiModels?.join(', ') || '空'}`;
        }

        state.loadLocalModelButton.disabled = !status.lmStudio.ok || !state.preferredLoadModel || uniqueLoadedLocalModels.includes(state.preferredLoadModel);
        state.loadLocalModelButton.textContent = uniqueLoadedLocalModels.includes(state.preferredLoadModel)
          ? '本地模型已加载'
          : recommended
            ? `加载 ${recommended.label || recommended.id}`
            : '加载本地模型';

        setDot(state.stDot, status.sillyTavern.ok);
        state.stText.textContent = status.sillyTavern.ok ? '服务已就绪' : '未启动，正在尝试启动';
        state.stUrl.textContent = status.config.sillyTavernUrl;
        state.sillyTavernUrl = status.config.sillyTavernUrl;

        const deepseek = status.proxy.providers.find((provider) => provider.id === 'deepseek');
        const openai = status.proxy.providers.find((provider) => provider.id === 'openai');
        const cloudNames = [
          deepseek?.configured ? 'DeepSeek' : null,
          openai?.configured ? 'OpenAI' : null,
        ].filter(Boolean);
        setDot(state.proxyDot, Boolean(status.proxy.baseUrl), !status.proxy.baseUrl);
        state.proxyText.textContent = cloudNames.length
          ? `PR Agent 已启用：${status.proxy.smart.defaultModel}，云端：${cloudNames.join(' / ')}`
          : `PR Agent 已启用：${status.proxy.smart.defaultModel}，云端未配置时自动回退本地`;
        state.proxyUrl.textContent = status.proxy.baseUrl || `http://127.0.0.1:${backendPort}/v1`;
        state.modeAgent.textContent = status.proxy.smart.defaultModel || 'pr-agent';
        state.modeLocal.textContent = status.lmStudio.ok
          ? (uniqueLoadedLocalModels[0] || recommended?.id || '已连接 LM Studio')
          : '等待 LM Studio';
        state.modeCloud.textContent = cloudNames.length ? cloudNames.join(' / ') : '自动回退本地';
        state.modeTheme.textContent = status.sillyTavernTheme?.installed ? '微信风格已安装' : '等待安装主题';

        state.footer.textContent = `本地后端端口 ${status.backendPort || backendPort}`;
        const allReady = status.lmStudio.ok && status.sillyTavern.ok && Boolean(status.proxy.baseUrl);
        setDot(state.headerDot, allReady, !allReady);
        state.headerText.textContent = allReady ? '全部就绪' : '正在准备';
      }

      function renderUpdate(update) {
        if (!update) {
          return;
        }
        const pending = update.status === 'checking' || update.status === 'downloading' || update.status === 'installing';
        const ok = ['current', 'available', 'ready', 'downloading', 'checking', 'installing'].includes(update.status);
        setDot(state.updateDot, ok, pending);
        const suffix = update.percent !== undefined ? ` (${update.percent}%)` : '';
        state.updateText.textContent = `${update.message || '等待检查'}${suffix}`;
        state.installUpdateButton.disabled = !update.canInstall;
      }

      async function getStatus() {
        const response = await fetch(`${apiBase}/api/status`);
        const status = await response.json();
        renderStatus(status);
      }

      async function postAction(path, body) {
        const response = await fetch(`${apiBase}${path}`, {
          method: 'POST',
          headers: body ? { 'Content-Type': 'application/json' } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        });
        const payload = await response.json();
        if (payload.status) {
          renderStatus(payload.status);
        }
        return payload;
      }

      async function refreshUpdateState() {
        const response = await fetch(`${apiBase}/api/update/state`);
        const payload = await response.json();
        renderUpdate(payload.state);
      }

      function closeMenus() {
        document.querySelectorAll('details[open]').forEach((menu) => {
          menu.open = false;
        });
      }

      document.querySelector('#sidebar-toggle').addEventListener('click', () => {
        document.body.classList.toggle('left-collapsed');
      });

      document.querySelector('#mobile-sidebar-button').addEventListener('click', () => {
        document.body.classList.toggle('left-open');
      });

      function toggleRightPanel() {
        if (window.matchMedia('(max-width: 1120px)').matches) {
          document.body.classList.toggle('right-open');
          document.body.classList.remove('right-hidden');
          return;
        }
        document.body.classList.toggle('right-hidden');
      }

      document.querySelector('#right-toggle').addEventListener('click', toggleRightPanel);
      document.querySelector('#composer-settings-button').addEventListener('click', toggleRightPanel);

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.more-menu')) {
          closeMenus();
        }
      });

      document.querySelector('#start-button').addEventListener('click', async () => {
        closeMenus();
        state.footer.textContent = '正在启动服务';
        await postAction('/api/start');
        await getStatus();
      });

      document.querySelector('#open-models-button').addEventListener('click', () => {
        closeMenus();
        postAction('/api/open/model-folder');
      });

      document.querySelector('#load-local-model-button').addEventListener('click', async () => {
        closeMenus();
        if (!state.preferredLoadModel) {
          return;
        }
        state.footer.textContent = `正在加载本地模型：${state.preferredLoadModel}`;
        state.loadLocalModelButton.disabled = true;
        state.loadLocalModelButton.textContent = '正在加载模型';
        const result = await postAction('/api/models/load', { modelId: state.preferredLoadModel });
        if (!result.ok) {
          state.footer.textContent = result.reason || result.error || '模型加载失败';
        }
        await getStatus();
      });

      document.querySelector('#copy-proxy-button').addEventListener('click', async () => {
        await navigator.clipboard.writeText(state.proxyUrl.textContent);
        state.footer.textContent = `已复制：${state.proxyUrl.textContent}`;
      });

      document.querySelector('#open-st-button').addEventListener('click', () => {
        postAction('/api/open/sillytavern');
      });

      document.querySelector('#update-button').addEventListener('click', async () => {
        closeMenus();
        setDot(state.updateDot, false, true);
        state.updateText.textContent = '正在检查更新';
        const result = await postAction('/api/update/check');
        if (result.ok) {
          setDot(state.updateDot, true);
          renderUpdate(result.state);
        } else {
          setDot(state.updateDot, false);
          state.updateText.textContent = result.reason || result.error || '当前环境不能自动更新';
        }
      });

      document.querySelector('#install-update-button').addEventListener('click', async () => {
        closeMenus();
        setDot(state.updateDot, false, true);
        state.updateText.textContent = '正在准备安装更新';
        const result = await postAction('/api/update/install');
        if (!result.ok) {
          setDot(state.updateDot, false);
          state.updateText.textContent = result.reason || '没有可安装的更新';
        }
      });

      document.querySelector('#open-releases-button').addEventListener('click', () => {
        closeMenus();
        postAction('/api/update/releases');
      });

      window.prDesktop?.onServiceStatus(renderStatus);
      window.prDesktop?.onUpdateState((update) => {
        renderUpdate(update);
      });

      getStatus();
      refreshUpdateState();
      setInterval(getStatus, 2500);
      setInterval(refreshUpdateState, 8000);
    </script>
  </body>
</html>
