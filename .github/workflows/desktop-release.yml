name: Build PR Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run lint:js

      - name: Build installer for tagged release
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PR Desktop ${{ github.ref_name }}
          files: |
            desktop/dist/PR-Desktop-Setup-*.exe
            desktop/dist/PR-Desktop-Setup-*.exe.blockmap
            desktop/dist/PR-Desktop-Portable-*.exe
            desktop/dist/latest.yml

      - name: Build installer for manual run
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload manual artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-desktop-windows
          path: desktop/dist/**
